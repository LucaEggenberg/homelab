apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pihole
spec:
  project: default
  sources:
  - repoURL: https://mojo2600.github.io/pihole-kubernetes/
    targetRevision: 2.35.0
    chart: pihole
    helm:
      valueFiles:
        - $values/applications/kubernetes/pihole/helm-values.yml
  - path: applications/kubernetes/pihole
    repoURL: https://git.eggenberg.io/luca/homelab.git
    targetRevision: HEAD
    ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: pihole
  syncPolicy:
    automated: {}
    syncOptions:
      - CreateNamespace=true